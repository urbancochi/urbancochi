<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>Urban Cochi | Gallery</title>
  <meta name="description" content="Explore Urban Cochi's custom clothing, uniforms and premium fashion designs.">
  <meta name="keywords" content="Urban Cochi gallery, custom clothing Kochi, uniforms Kerala">
  <meta name="author" content="Urban Cochi">

  <!-- Open Graph -->
  <meta property="og:title" content="Urban Cochi Gallery">
  <meta property="og:description" content="Visual stories from Urban Cochi — premium fashion and uniforms.">
  <meta property="og:image" content="logo.png">
  <meta property="og:type" content="website">

  <link rel="stylesheet" href="gallery.css">
</head>

<body>

  <!-- INTRO -->
  <div id="flashIntro" class="flash-intro">
    <div class="flash"></div>
    <div class="flash-content">
      <img src="logo.png" alt="Urban Cochi Logo">
      <h1>Visual Stories</h1>
      <p>Our work — uniforms, prints, and bespoke pieces</p>
      <button id="enterGallery" class="btn primary">Enter Gallery</button>
    </div>
  </div>

  <!-- MAIN -->
  <main id="galleryMain" class="hidden">

    <!-- NAVBAR -->
    <header class="navbar">
      <img src="logo.png" alt="Urban Cochi Logo">

      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="custom.html">Custom</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <!-- GALLERY -->
    <section class="grid">

      <figure>
        <img src="product1.jpg" alt="Custom Printed T-shirt">
        <figcaption>Custom Printed Tee</figcaption>
      </figure>

      <figure>
        <img src="product2.jpg" alt="Exclusive T-shirt">
        <figcaption>Exclusive T-shirt</figcaption>
      </figure>

      <figure>
        <img src="product3.jpg" alt="Corporate Uniform">
        <figcaption>Corporate Uniform</figcaption>
      </figure>

    </section>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox">
      <button id="lbClose" class="lb-close">✕</button>
      <img id="lbImg" src="" alt="">
      <p id="lbCaption"></p>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <a href="index.html" class="back-btn">← Back to Home</a>
    </footer>

  </main>

  <script src="gallery.js"></script>
</body>
</html>
